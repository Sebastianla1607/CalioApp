server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: calio-identity-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:calio_identity_db}
    username: ${DB_USER:calio_user}
    password: ${DB_PASSWORD:calio_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:calio}
    password: ${RABBITMQ_PASSWORD:calio123}
    virtual-host: /

calio:
  jwt:
    secret: ${JWT_SECRET:cali0-super-secret-key-for-jwt-signing-256bits!!}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  rabbitmq:
    exchange: calio.events
    routing-keys:
      user-registered: user.registered
      profile-updated: user.profile.updated
      account-deleted: user.account.deleted

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false

logging:
  level:
    com.calio: DEBUG
    org.springframework.security: INFO
